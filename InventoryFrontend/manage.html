<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card-custom {
            border: none;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
            color: #6c757d;
        }
        .form-control {
            border-left: none;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }
        .input-group:focus-within .input-group-text, 
        .input-group:focus-within .form-control {
            border-color: #0d6efd;
            color: #0d6efd;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="container" style="max-width: 500px;">
        <div class="card card-custom p-4 border-top border-primary border-4">
            
            <div class="text-center mb-4">
                <h2 id="pageTitle" class="fw-bold text-dark">
                    <i class="fa-solid fa-box-open text-primary me-2"></i>Add New Product
                </h2>
                <p class="text-muted small">Enter the details below to update your inventory database.</p>
            </div>

            <form id="productForm" onsubmit="handleFormSubmit(event)">
                
                <div class="mb-3">
                    <label class="form-label fw-semibold">Product Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-tag"></i></span>
                        <input type="text" id="name" class="form-control bg-transparent" placeholder="e.g. Wireless Mouse" required minlength="3">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Price</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-dollar-sign"></i></span>
                        <input type="number" id="price" step="0.01" class="form-control bg-transparent" placeholder="0.00" required min="0.01">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Quantity in Stock</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-hashtag"></i></span>
                        <input type="number" id="quantity" class="form-control bg-transparent" placeholder="1" required min="1">
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                        <i class="fa-solid fa-floppy-disk me-2"></i> Save Product
                    </button>
                    <a href="index.html" class="btn btn-light text-secondary border">
                        <i class="fa-solid fa-arrow-left me-1"></i> Cancel and Return
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5161/api/products'; 
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        window.onload = async () => {
            if (productId) {
                document.getElementById('pageTitle').innerHTML = '<i class="fa-solid fa-pen-to-square text-warning me-2"></i>Edit Product';
                document.title = "Edit Product";
                
                try {
                    const response = await fetch(`${API_URL}/${productId}`);
                    const product = await response.json();

                    document.getElementById('name').value = product.name;
                    document.getElementById('price').value = product.price;
                    document.getElementById('quantity').value = product.quantity;
                } catch (err) {
                    Swal.fire('Error', 'Could not load product data.', 'error');
                }
            }
        };

        async function handleFormSubmit(event) {
            event.preventDefault();

            const name = document.getElementById('name').value.trim();
            const price = parseFloat(document.getElementById('price').value);
            const quantity = parseInt(document.getElementById('quantity').value);

            // 1. Basic Format Validation
            if (name.length < 3 || price <= 0 || quantity < 1) {
                Swal.fire({
                    title: 'Invalid Input',
                    text: 'Please ensure the name is at least 3 characters, and price/quantity are greater than zero.',
                    icon: 'warning',
                    confirmButtonColor: '#0d6efd'
                });
                return;
            }

            try {
                // 2. DUPLICATE CHECK: Fetch existing inventory
                const checkResponse = await fetch(API_URL);
                const existingProducts = await checkResponse.json();

                // Convert both the typed name and database names to lowercase to compare them.
                // The (p.id !== productId) ensures we don't accidentally block you from editing an existing item!
                const isDuplicate = existingProducts.some(p => 
                    p.name.toLowerCase() === name.toLowerCase() && p.id !== productId
                );

                if (isDuplicate) {
                    Swal.fire({
                        title: 'Product Already Exists',
                        text: `An item named "${name}" is already in your inventory. Please edit the existing item to update its stock.`,
                        icon: 'error',
                        confirmButtonColor: '#dc3545' // Bootstrap Red
                    });
                    return; // Stop the submission completely
                }

                // 3. Proceed with Save if no duplicates are found
                const productData = { name, price, quantity };
                let method = 'POST';
                let url = API_URL;

                if (productId) {
                    method = 'PUT';
                    url = `${API_URL}/${productId}`;
                    productData.id = productId; 
                }

                await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(productData)
                });

                await Swal.fire({
                    title: 'Success!',
                    text: 'Product has been saved to the database.',
                    icon: 'success',
                    timer: 1500,
                    showConfirmButton: false
                });

                window.location.href = 'index.html';
                
            } catch (err) {
                Swal.fire('Error', 'Failed to save the product. Is your backend running?', 'error');
                console.error(err);
            }
        }
    </script>
</body>
</html>
